<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OnTo.kr</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css?v=1.3.6" />
  </head>
  <body onclick="requestNotiPermission()">
    <div id="globalContextMenu" class="context-menu">
      <div id="ctx-add" onclick="addCurrentItem()" data-i18n="cmAdd">추가</div>
      <div id="ctx-edit" onclick="editCurrentItem()" data-i18n="cmEdit">
        수정
      </div>
      <div
        id="ctx-del"
        class="cm-del"
        onclick="showDeleteConfirm()"
        data-i18n="cmDelete"
      >
        삭제
      </div>
      <div
        id="ctx-hide"
        class="cm-hide"
        onclick="hideCurrentWidget()"
        data-i18n="cmHide"
      >
        숨기기
      </div>
    </div>

    <!-- 커스텀 삭제 확인 모달 -->
    <div
      id="deleteConfirmModal"
      class="modal"
      onclick="event.target == this && closeModal('deleteConfirmModal')"
    >
      <div class="modal-content delete-modal">
        <div class="delete-icon">
          <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h3 data-i18n="alertDel" style="margin-bottom: 30px">
          삭제하시겠습니까?
        </h3>
        <div style="display: flex; gap: 12px">
          <button
            class="btn-save"
            style="background: #334155; color: #fff; flex: 1"
            onclick="closeModal('deleteConfirmModal')"
            data-i18n="btnCancel"
          >
            취소
          </button>
          <button
            class="btn-save"
            style="background: #ef4444; color: #fff; flex: 1"
            onclick="deleteCurrentItem()"
            data-i18n="btnConfirmDelete"
          >
            삭제
          </button>
        </div>
      </div>
    </div>

    <!-- 범용 안내 모달 -->
    <div
      id="alertModal"
      class="modal"
      onclick="event.target == this && closeModal('alertModal')"
    >
      <div class="modal-content delete-modal">
        <div class="delete-icon">
          <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h3
          id="alertModalMsg"
          data-i18n="alertLocExists"
          style="margin-bottom: 30px"
        >
          이미 추가된 지역입니다.
        </h3>
        <div style="display: flex; justify-content: center">
          <button
            class="btn-save"
            style="
              background: var(--accent-color);
              color: var(--accent-contrast);
              min-width: 120px;
            "
            onclick="closeModal('alertModal')"
            data-i18n="btnOk"
          >
            확인
          </button>
        </div>
      </div>
    </div>

    <!-- 전체 초기화 확인 모달 -->
    <div
      id="resetConfirmModal"
      class="modal"
      onclick="event.target == this && closeModal('resetConfirmModal')"
    >
      <div class="modal-content delete-modal">
        <div class="delete-icon"><i class="fas fa-history"></i></div>
        <h3 style="margin-bottom: 30px">
          정말로 초기화 하시겠습니까?<br /><span
            style="font-size: 0.8rem; font-weight: normal; opacity: 0.7"
            >(모든 설정과 데이터가 영구 삭제됩니다)</span
          >
        </h3>
        <div style="display: flex; gap: 12px">
          <button
            class="btn-save"
            style="background: #334155; color: #fff; flex: 1"
            onclick="closeModal('resetConfirmModal')"
            data-i18n="btnCancel"
          >
            취소
          </button>
          <button
            class="btn-save"
            style="background: #ef4444; color: #fff; flex: 1"
            onclick="resetAllData()"
          >
            초기화
          </button>
        </div>
      </div>
    </div>

    <div id="top-left-widgets">
      <div class="fab-container">
        <div
          class="widget-btn fab-main"
          data-i18n-title="tipFile"
          onclick="toggleFab('tl-fab', event)"
        >
          <i class="fas fa-folder"></i>
        </div>
        <div class="fab-menu right-menu" id="tl-fab">
          <input
            type="file"
            id="importFile"
            style="display: none"
            accept=".json"
            onchange="importData(event)"
          />
          <div
            class="widget-btn"
            data-i18n-title="tipBackup"
            onclick="exportData()"
          >
            <i class="fas fa-download"></i>
          </div>
          <div
            class="widget-btn"
            data-i18n-title="tipRestore"
            onclick="document.getElementById('importFile').click()"
          >
            <i class="fas fa-upload"></i>
          </div>
        </div>
      </div>
    </div>
    <div class="sidebar-trigger"><div class="sidebar-hint">&laquo;</div></div>
    <div class="widget-sidebar">
      <div
        class="sidebar-icon"
        id="side-weather"
        onclick="toggleWidget('weather')"
        data-i18n-title="sideWeather"
      >
        <i class="fas fa-cloud-sun"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-quote"
        onclick="toggleWidget('quote')"
        data-i18n-title="sideQuote"
      >
        <i class="fas fa-quote-right"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-search"
        onclick="toggleWidget('search')"
        data-i18n-title="lblSearch"
      >
        <i class="fas fa-search"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-shortcut"
        onclick="toggleWidget('shortcut')"
        data-i18n-title="tipLink"
      >
        <i class="fas fa-link"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-memo"
        onclick="toggleWidget('memo')"
        data-i18n-title="sideMemo"
      >
        <i class="fas fa-sticky-note"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-noti"
        onclick="toggleWidget('noti')"
        data-i18n-title="sideNoti"
      >
        <i class="fas fa-bell"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-calendar"
        onclick="toggleWidget('calendar')"
        data-i18n-title="sideCalendar"
      >
        <i class="fas fa-calendar-alt"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-clock"
        onclick="toggleWidget('clock')"
        data-i18n-title="sideClock"
      >
        <i class="fas fa-clock"></i>
      </div>
    </div>
    <div
      id="top-right-widgets"
      oncontextmenu="showContextMenu(event, 'weather')"
    ></div>
    <div id="quote-section">
      <div class="quote-container" onclick="fetchQuote()">
        <span id="quote-text">...</span>
        <span id="quote-author-wrap">
          <span id="quote-author"></span>
        </span>
      </div>
    </div>
    <div id="search-section">
      <div class="search-box">
        <div class="ai-icon-wrapper" onclick="ui.toggleWidget('ai')">
          <i class="fas fa-robot ai-search-icon" data-i18n-title="sideAI"></i>
          <div class="ai-orbit">
            <div class="ai-orbit-dot dot-1"></div>
            <div class="ai-orbit-dot dot-2"></div>
            <div class="ai-orbit-dot dot-3"></div>
          </div>
        </div>
        <input
          type="text"
          id="searchInput"
          data-i18n-ph="searchPh"
          placeholder="검색어를 입력하세요"
          onkeydown="if(event.key === 'Enter') performSearch();"
          />

        <div class="search-engine-icon" onclick="toggleSearchEngineMenu(event)">
          <div id="search-engine-current"></div>
          <i
            class="fas fa-caret-right"
            style="
              font-size: 0.7rem;
              color: #94a3b8;
              margin-left: 5px;
              opacity: 0.7;
            "
          ></i>
          <div id="search-engine-menu" class="search-engine-menu"></div>
        </div>
      </div>
    </div>
    <div id="shortcut-container"></div>
    <div
      id="ai-overlay"
      class="modal-overlay widget-hidden"
      onclick="ui.toggleWidget('ai')"
    ></div>
    <div id="ai-chatbot-container" class="widget-hidden">
      <div class="ai-history-panel" id="ai-history">
        <div class="ai-history-header">
          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              position: relative;
            "
          >
            <i
              id="ai-btn-new-chat"
              class="fas fa-plus"
              onclick="ai.createNewChat()"
              data-i18n-title="cmAdd"
              style="font-size: 0.9rem; cursor: pointer"
            ></i>
            <span
              id="ai-history-status-dot"
              style="
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #94a3b8;
                display: inline-block;
                margin-left: 2px;
              "
            ></span>
            <span
              class="history-title"
              id="ai-history-model-name"
              style="font-size: 0.85rem"
              onclick="ai.toggleModelPopup(event)"
              >...</span
            >
            <div id="ai-model-popup" class="ai-model-popup"></div>
          </div>
          <i
            id="ai-history-toggle"
            class="fas fa-angles-left"
            onclick="ai.toggleHistory()"
          ></i>
        </div>
        <div class="ai-history-list" id="ai-history-list"></div>
        <div class="ai-history-footer">
          <i class="fas fa-search" style="font-size: 0.8rem; opacity: 0.5"></i>
          <input
            type="text"
            id="ai-history-search"
            placeholder="검색..."
            oninput="ai.filterHistory(this.value)"
          />
        </div>
      </div>
      <div class="ai-main-panel">
        <div class="ai-chat-header">
          <div class="ai-status" id="ai-status">
            <input
              type="text"
              id="ai-chat-title-input"
              class="ai-title-input"
              onchange="ai.updateChatTitle(this.value)"
              placeholder="새 대화"
            />
          </div>
          <div class="ai-actions"></div>
        </div>
        <div class="ai-chat-messages" id="ai-messages"></div>
        <div class="ai-chat-input-area">
          <textarea
            id="ai-user-input"
            data-i18n-ph="aiInputPh"
            placeholder="메시지를 입력하세요... (Ctrl+Enter로 전송)"
            onkeydown="ai.handleKeyDown(event)"
          ></textarea>
          <div class="ai-input-actions">
            <div
              id="ai-attach-wrapper"
              style="display: inline-block"
              onmouseover="ai.attachFile(event)"
              onmouseout="ai.hideAttachTip()"
            >
              <button id="ai-attach-btn" class="ai-icon-btn">
                <i class="fas fa-paperclip"></i>
              </button>
            </div>
            <button id="ai-send-btn" onclick="ai.sendMessage()">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom-widgets">
      <div class="left-area">
        <div
          class="smart-folder"
          id="memo-folder"
          oncontextmenu="showContextMenu(event, 'memo')"
        >
          <div
            class="widget-btn folder-icon"
            onclick="toggleFolder('memo-folder', event)"
          >
            <i class="fas fa-sticky-note" style="color: var(--memo-color)"></i>
          </div>
          <div class="folder-content" id="memo-list"></div>
        </div>
        <div class="fab-container">
          <div
            class="widget-btn fab-main"
            data-i18n-title="tipMenu"
            onclick="toggleFab('bl-fab', event)"
          >
            <i class="fas fa-cog"></i>
          </div>
          <div class="fab-menu right-menu" id="bl-fab">
            <div
              class="widget-btn"
              data-i18n-title="tipSetting"
              onclick="openSettingModal()"
            >
              <i class="fas fa-sliders-h"></i>
            </div>
            <div
              class="widget-btn"
              data-i18n-title="tipNoti"
              onclick="openNotiModal()"
            >
              <i class="fas fa-bell"></i>
            </div>
            <div
              class="widget-btn"
              data-i18n-title="tipMemo"
              onclick="openMemoModal()"
            >
              <i class="fas fa-pen"></i>
            </div>
            <div
              class="widget-btn"
              data-i18n-title="tipLink"
              onclick="openLinkModal()"
            >
              <i class="fas fa-link"></i>
            </div>
          </div>
        </div>
      </div>
      <div class="right-area">
        <div
          id="clock-container"
          oncontextmenu="showContextMenu(event, 'clock')"
          onclick="toggleTimeFormat()"
        >
          <div id="clock-time">00:00:00</div>
        </div>
        <div
          id="calendar-container"
          class="calendar-widget"
          oncontextmenu="showContextMenu(event, 'calendar')"
          onclick="calendar.handleWidgetClick(event)"
        >
          <div class="calendar-header">
            <i
              class="fas fa-caret-left cal-nav"
              onclick="calendar.changeMonth(-1); event.stopPropagation();"
            ></i>
            <div class="calendar-header-center">
              <span id="cal-month-year">...</span>
              <i
                class="fas fa-undo today-icon"
                onclick="calendar.resetToToday(); event.stopPropagation();"
                data-i18n-title="tipToday"
              ></i>
            </div>
            <i
              class="fas fa-caret-right cal-nav"
              onclick="calendar.changeMonth(1); event.stopPropagation();"
            ></i>
          </div>
          <div class="calendar-body-container" id="calendar-body">
            <div class="calendar-days-header" id="cal-days-header"></div>
            <div class="calendar-grid-wrapper">
              <div class="calendar-grid" id="calendar-grid"></div>
            </div>
          </div>
          <div class="month-selector" id="month-selector"></div>
        </div>
        <div
          class="smart-folder"
          id="noti-folder"
          oncontextmenu="showContextMenu(event, 'noti')"
        >
          <div
            class="widget-btn folder-icon"
            onclick="toggleFolder('noti-folder', event)"
          >
            <i class="fas fa-bell" style="color: var(--warning-color)"></i>
          </div>
          <div class="folder-content" id="noti-list"></div>
        </div>
      </div>
    </div>
    <div
      class="modal"
      id="settingModal"
      onclick="event.target == this && closeModal('settingModal')"
    >
      <div class="modal-content">
        <h3 data-i18n="modalSetting">환경 설정</h3>
        <div style="flex: 1; display: flex; flex-direction: column">
          <div class="setting-grid">
            <div class="setting-column">
              <!-- 테마 색상 -->
              <div
                class="setting-group-title"
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                "
              >
                <span data-i18n="lblTheme">테마 색상</span>
                <div style="display: flex; gap: 10px">
                  <label
                    class="compact-checkbox-label"
                    style="
                      display: flex;
                      align-items: center;
                      gap: 4px;
                      cursor: pointer;
                    "
                  >
                    <input
                      type="checkbox"
                      id="themeLighter"
                      onchange="updateThemeAdjustment('lighter')"
                      style="width: 12px; height: 12px; margin: 0"
                    />
                    <span class="setting-label-text" data-i18n="lblLighter"
                      >더 밝게</span
                    >
                  </label>
                  <label
                    class="compact-checkbox-label"
                    style="
                      display: flex;
                      align-items: center;
                      gap: 4px;
                      cursor: pointer;
                    "
                  >
                    <input
                      type="checkbox"
                      id="themeDarker"
                      onchange="updateThemeAdjustment('darker')"
                      style="width: 12px; height: 12px; margin: 0"
                    />
                    <span class="setting-label-text" data-i18n="lblDarker"
                      >더 어둡게</span
                    >
                  </label>
                </div>
              </div>
              <div class="theme-colors" style="margin-bottom: 20px">
                <div
                  class="color-swatch"
                  style="background: #ef4444"
                  onclick="setTheme('#ef4444', false)"
                ></div>
                <div
                  class="color-swatch"
                  style="background: #f97316"
                  onclick="setTheme('#f97316', false)"
                ></div>
                <div
                  class="color-swatch"
                  style="background: #eab308"
                  onclick="setTheme('#eab308', false)"
                ></div>
                <div
                  class="color-swatch"
                  style="background: #22c55e"
                  onclick="setTheme('#22c55e', false)"
                ></div>
                <div
                  class="color-swatch"
                  style="background: #3b82f6"
                  onclick="setTheme('#3b82f6', false)"
                ></div>
                <div
                  class="color-swatch"
                  style="background: #6366f1"
                  onclick="setTheme('#6366f1', false)"
                ></div>
                <div
                  class="color-swatch"
                  style="background: #a855f7"
                  onclick="setTheme('#a855f7', false)"
                ></div>
                <div
                  class="color-swatch"
                  style="background: #ec4899"
                  onclick="setTheme('#ec4899', false)"
                ></div>
                <div
                  class="color-swatch"
                  style="background: #fff"
                  onclick="setTheme('#fff', false)"
                ></div>
                <div
                  class="color-swatch"
                  style="
                    background: #000;
                    border: 1px solid rgba(255, 255, 255, 0.3);
                  "
                  onclick="setTheme('#000', false)"
                ></div>
              </div>

              <!-- 레이아웃 -->
              <div
                class="setting-group-title"
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                "
              >
                <span data-i18n="lblLayout">레이아웃</span>
                <label
                  class="compact-checkbox-label"
                  style="
                    display: flex;
                    align-items: center;
                    gap: 6px;
                    font-weight: normal;
                    cursor: pointer;
                  "
                >
                  <input
                    type="checkbox"
                    id="showFileMgmtCheckbox"
                    onchange="toggleFileMgmt(this.checked)"
                    style="
                      width: 14px;
                      height: 14px;
                      margin: 0;
                      cursor: pointer;
                    "
                  />
                  <span class="setting-label-text" data-i18n="lblShowFileMgmt"
                    >파일 관리 보기</span
                  >
                </label>
              </div>
              <div
                class="setting-row"
                style="gap: 15px; align-items: center; margin-bottom: 20px; justify-content: space-between;"
              >
                <div
                  style="display: flex; align-items: center; gap: 8px"
                >
                  <span
                    style="
                      font-size: 0.85rem;
                      color: #94a3b8;
                      white-space: nowrap;
                      margin: 0;
                      display: flex;
                      align-items: center;
                    "
                    data-i18n="lblQuoteSize"
                    >명언 크기</span
                  >
                  <div id="quote-size-wrap" style="position: relative; width: 65px;">
                    <div id="quote-size-trigger" class="weather-custom-select" onclick="settings.toggleCustomSelect('quote-size-popup', event)">
                      <span id="quote-size-text" data-i18n="optMedium">중</span>
                      <i class="fas fa-chevron-down" style="font-size: 0.6rem; opacity: 0.5;"></i>
                    </div>
                    <div id="quote-size-popup" class="ai-model-popup weather-popup"></div>
                  </div>
                </div>
                <div
                  style="display: flex; align-items: center; gap: 8px;"
                >
                  <span
                    style="
                      font-size: 0.85rem;
                      color: #94a3b8;
                      white-space: nowrap;
                      margin: 0;
                      display: flex;
                      align-items: center;
                    "
                    data-i18n="lblWidgetSize"
                    >위젯 크기</span
                  >
                  <div id="widget-size-wrap" style="position: relative; width: 65px;">
                    <div id="widget-size-trigger" class="weather-custom-select" onclick="settings.toggleCustomSelect('widget-size-popup', event)">
                      <span id="widget-size-text" data-i18n="optMedium">중</span>
                      <i class="fas fa-chevron-down" style="font-size: 0.6rem; opacity: 0.5;"></i>
                    </div>
                    <div id="widget-size-popup" class="ai-model-popup weather-popup"></div>
                  </div>
                </div>
              </div>

              <!-- 배경 키워드 -->
              <div
                class="setting-group-title"
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                "
              >
                <span data-i18n="lblBgKeyword">배경 키워드</span>
                <div style="display: flex; gap: 10px">
                  <label
                    class="compact-checkbox-label"
                    style="
                      display: flex;
                      align-items: center;
                      gap: 4px;
                      cursor: pointer;
                    "
                  >
                    <input
                      type="checkbox"
                      id="engineUnsplash"
                      onchange="updateImageEngine('unsplash')"
                      style="width: 12px; height: 12px; margin: 0"
                    />
                    <span class="setting-label-text">Unsplash</span>
                  </label>
                  <label
                    class="compact-checkbox-label"
                    style="
                      display: flex;
                      align-items: center;
                      gap: 4px;
                      cursor: pointer;
                    "
                  >
                    <input
                      type="checkbox"
                      id="engineFlickr"
                      onchange="updateImageEngine('flickr')"
                      style="width: 12px; height: 12px; margin: 0"
                    />
                    <span class="setting-label-text">Flickr</span>
                  </label>
                </div>
              </div>
              <input
                type="text"
                id="bgKeywordInput"
                data-i18n-ph="bgKeywordPh"
                placeholder="예: nature, space, city, dark"
                oninput="updateBgKeyword(this.value)"
                style="width: 98%; margin-left: 1%"
              />
            </div>

            <div class="setting-column">
              <!-- 날씨 -->
              <div
                class="setting-group-title"
                style="display: flex; justify-content: space-between"
              >
                <span data-i18n="lblWeather">날씨</span>
                <label class="compact-checkbox-label">
                  <input
                    type="checkbox"
                    id="showCurrentWeather"
                    onchange="updateShowWeather(this.checked)"
                  />
                  <span class="setting-label-text" data-i18n="lblCurrentWeather"
                    >현지 날씨</span
                  >
                </label>
              </div>
              <div id="weather-select-wrap" style="position: relative; margin-bottom: 15px; width: 98%; margin-left: 1%;">
                <div id="weather-location-trigger" class="weather-custom-select" onclick="weather.toggleLocationPopup(event)">
                  <span id="weather-trigger-text">도시 목록</span>
                  <i class="fas fa-chevron-down" style="font-size: 0.7rem; opacity: 0.5;"></i>
                </div>
                <div id="weather-location-popup" class="ai-model-popup weather-popup"></div>
              </div>
              <div class="city-search-container" style="margin-bottom: 20px;">
                <input
                  type="text"
                  id="citySearchInput"
                  data-i18n-ph="citySearchPh"
                  placeholder="도시 검색 (예: 서울, London)"
                  autocomplete="off"
                  oninput="searchCities(this.value)"
                  style="width: 98%; margin-left: 1%"
                />
                <div id="citySearchResults" class="city-results"></div>
              </div>

              <!-- 검색 엔진 -->
              <div
                class="setting-group-title"
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                "
              >
                <span data-i18n="lblSearchEngine">검색 엔진</span>
                <label
                  class="compact-checkbox-label"
                  style="
                    display: flex;
                    align-items: center;
                    gap: 6px;
                    font-weight: normal;
                    cursor: pointer;
                  "
                >
                  <input
                    type="checkbox"
                    id="searchNewTab"
                    onchange="updateSearchNewTab(this.checked)"
                    style="
                      width: 14px;
                      height: 14px;
                      margin: 0;
                      cursor: pointer;
                    "
                  />
                  <span class="setting-label-text" data-i18n="lblSearchNewTab"
                    >새 창으로 검색</span
                  >
                </label>
              </div>
              <div id="search-select-wrap" style="position: relative; margin-bottom: 15px; width: 98%; margin-left: 1%;">
                <div id="search-engine-trigger" class="weather-custom-select" onclick="settings.toggleSearchEnginePopup(event)">
                  <div style="display: flex; align-items: center; gap: 10px;">
                    <div id="trigger-favicon" class="engine-favicon"></div>
                    <span id="trigger-name">Google</span>
                  </div>
                  <i class="fas fa-chevron-down" style="font-size: 0.7rem; opacity: 0.5;"></i>
                </div>
                <div id="search-engine-popup" class="engine-popup"></div>
              </div>
              
              <div class="engine-add-container">
                <input
                  type="text"
                  id="customSearchUrlInput"
                  placeholder="https://example.com/search?q="
                  style="margin-bottom: 0; flex: 1;"
                />
                <button class="btn-save" onclick="settings.addCustomSearchEngine()" style="padding: 0; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                  <i class="fas fa-plus"></i>
                </button>
              </div>
            </div>

            <!-- AI 설정 (가로 전체 사용) -->
            <div class="setting-column" style="grid-column: 1 / span 2">
              <div
                class="setting-group-title"
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                "
              >
                <div style="display: flex; align-items: center; gap: 10px">
                  <span data-i18n="lblAISetting">AI 설정</span>
                  <span
                    id="ai-temp-msg"
                    style="font-size: 0.75rem; display: none"
                  ></span>
                </div>
                <div style="display: flex; align-items: center; gap: 15px">
                  <div
                    id="ai-connection-status"
                    style="
                      font-size: 0.75rem;
                      display: flex;
                      align-items: center;
                      gap: 5px;
                      color: #94a3b8;
                    "
                    data-i18n-title="lblServerCheck"
                  >
                    <span
                      class="status-dot"
                      style="
                        width: 4px;
                        height: 4px;
                        border-radius: 50%;
                        background: #94a3b8;
                        display: inline-block;
                      "
                    ></span>
                    <span class="status-text" data-i18n="aiNeedConnect"
                      >서버 연결 필요</span
                    >
                  </div>
                  <label
                    class="compact-checkbox-label"
                    style="
                      display: flex;
                      align-items: center;
                      gap: 6px;
                      font-weight: normal;
                      cursor: pointer;
                      color: #94a3b8;
                    "
                  >
                    <input
                      type="checkbox"
                      id="aiOutputAtOnceCheck"
                      onchange="updateAiOutputAtOnce(this.checked)"
                      style="
                        width: 14px;
                        height: 14px;
                        margin: 0;
                        cursor: pointer;
                      "
                    />
                    <span
                      class="setting-label-text"
                      data-i18n="lblAIOutputAtOnce"
                      >답변 한번에 출력</span
                    >
                  </label>
                </div>
              </div>
              <div
                style="
                  display: flex;
                  gap: 15px;
                  align-items: center;
                  width: 98%;
                  margin-left: 1%;
                  margin-bottom: 5px;
                  min-height: 40px;
                "
              >
                <div
                  style="display: flex; align-items: center; gap: 8px; flex: 1 1 30%; min-width: 0; position: relative;"
                >
                  <span
                    style="
                      font-size: 0.85rem;
                      color: #94a3b8;
                      white-space: nowrap;
                    "
                    >AI</span
                  >
                  <div id="ai-provider-trigger" class="weather-custom-select" style="flex: 1; margin-bottom: 0; min-width: 0;" onclick="settings.toggleAIPopup(event)">
                    <div style="display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; overflow: hidden;">
                      <i id="ai-trigger-icon" class="fas fa-robot" style="font-size: 0.9rem; opacity: 0.7; flex-shrink: 0;"></i>
                      <span id="ai-trigger-name" class="engine-name">사용 안 함</span>
                    </div>
                    <i class="fas fa-chevron-down" style="font-size: 0.7rem; opacity: 0.5; flex-shrink: 0;"></i>
                  </div>
                  <div id="ai-provider-popup" class="engine-popup"></div>
                </div>
                <div
                  id="aiSettingsPanel"
                  style="display: flex; gap: 15px; align-items: center; flex: 1 1 70%; min-width: 0;"
                >
                  <div
                    style="
                      display: flex;
                      align-items: center;
                      gap: 8px;
                      flex: 1;
                      position: relative;
                    "
                  >
                    <span
                      style="
                        font-size: 0.85rem;
                        color: #94a3b8;
                        white-space: nowrap;
                      "
                      >모델</span
                    >
                    <div id="ai-model-trigger" class="weather-custom-select" style="flex: 1; margin-bottom: 0; min-width: 0;" onclick="settings.toggleModelSelectPopup(event)">
                      <span id="ai-model-trigger-name" class="engine-name" style="flex: 1;" data-i18n="aiNoServer">접속 안됨</span>
                      <i class="fas fa-chevron-down" style="font-size: 0.7rem; opacity: 0.5; flex-shrink: 0;"></i>
                    </div>
                    <div id="ai-model-select-popup" class="engine-popup"></div>
                  </div>
                  <div
                    style="
                      display: flex;
                      align-items: center;
                      gap: 8px;
                      flex: 1;
                    "
                  >
                    <span
                      id="aiKeyLabel"
                      style="
                        font-size: 0.85rem;
                        color: #94a3b8;
                        white-space: nowrap;
                      "
                      data-i18n="lblAIUrl"
                      >URL</span
                    >
                    <div style="position: relative; flex: 1; display: flex; align-items: center; gap: 5px;">
                      <input
                        type="text"
                        id="aiServerUrlInput"
                        placeholder="서버 주소"
                        style="margin-bottom: 0; width: 100%;"
                        oninput="updateAiServerUrl(this.value)"
                      />
                      <input
                        type="password"
                        id="aiApiKeyInput"
                        placeholder="API Key"
                        style="margin-bottom: 0; width: 100%; display: none;"
                        oninput="updateAiApiKey(this.value)"
                      />
                      <div class="ai-check-btn-wrapper" style="position: relative; z-index: 10;">
                        <button 
                          id="ai-check-btn" 
                          onclick="ai.checkConnection()" 
                          style="padding: 0; width: 32px; height: 32px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #94a3b8; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;"
                          title="서버 체크"
                        >
                          <i class="fas fa-sync-alt ai-refresh-icon"></i>
                        </button>
                        <div id="ai-check-tooltip" class="ai-check-tooltip">연결됨</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div id="ai-custom-add-container" class="engine-popup" style="padding: 15px; z-index: 120; display: none;">
                <div style="display: flex; flex-direction: column; gap: 10px;">
                  <div style="font-size: 0.8rem; color: #94a3b8; display: flex; align-items: center; gap: 6px;">
                    <span>사용자 AI 추가</span>
                  </div>
                  <input
                    type="text"
                    id="customAiNameInput"
                    placeholder="AI 이름"
                    style="margin-bottom: 0; width: 100%;"
                  />
                  <input
                    type="text"
                    id="customAiUrlInput"
                    placeholder="https://example.com/api"
                    style="margin-bottom: 0; width: 100%;"
                  />
                  <button class="btn-save" onclick="settings.addCustomAI()" style="width: 100%; height: 38px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span>추가</span>
                  </button>
                </div>
              </div>
              <!-- 초기화 버튼 추가 -->
              <div
                style="
                  display: flex;
                  justify-content: flex-end;
                  margin-top: 20px;
                  margin-bottom: -10px;
                "
              >
                <button
                  class="btn-save"
                  style="
                    background: #ef4444;
                    color: #fff;
                    padding: 8px 20px;
                    font-size: 0.85rem;
                  "
                  onclick="openModal('resetConfirmModal')"
                >
                  전체 초기화
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div
      class="modal"
      id="linkModal"
      onclick="event.target == this && closeModal('linkModal')"
    >
      <div class="modal-content">
        <h3 id="linkModalTitle" data-i18n="modalLinkAdd">바로가기 추가</h3>
        <input
          type="text"
          id="siteName"
          data-i18n-ph="linkName"
          placeholder="이름"
        />
        <input
          type="text"
          id="siteUrl"
          data-i18n-ph="linkUrl"
          placeholder="URL (example.com)"
          onkeypress="event.key === 'Enter' && addShortcut()"
        />
        <div class="setting-footer">
          <button
            class="btn-save"
            id="linkSaveBtn"
            onclick="addShortcut()"
            data-i18n="btnSave"
          >
            추가
          </button>
        </div>
      </div>
    </div>
    <div
      class="modal"
      id="notiModal"
      onclick="event.target == this && closeModal('notiModal')"
    >
      <div class="modal-content">
        <h3 id="notiModalTitle" data-i18n="modalNotiAdd">알림 추가</h3>
        <input
          type="text"
          id="notiTitle"
          data-i18n-ph="notiTitle"
          placeholder="알림 제목"
        /><textarea
          id="notiDesc"
          data-i18n-ph="notiDesc"
          placeholder="알림 내용 (생략 가능)"
          rows="2"
        ></textarea>
        <div class="time-picker-row">
          <select id="notiHour" class="time-select"></select
          ><select id="notiMin" class="time-select"></select>
        </div>
        <div class="repeat-row">
          <input
            type="date"
            id="notiDate"
            class="time-select"
            style="margin-bottom: 0; flex: 1; padding: 10px; font-size: 0.9rem"
          />
          <div style="display: flex; align-items: center; gap: 6px">
            <label for="isRepeat" style="cursor: pointer" data-i18n="repeatSet"
              >반복 설정</label
            >
            <input
              type="checkbox"
              id="isRepeat"
              onchange="toggleDaySelector(this.checked)"
              style="
                margin: 0;
                padding: 0;
                width: 16px;
                height: 16px;
                cursor: pointer;
                box-sizing: border-box;
              "
            />
          </div>
        </div>
        <div id="day-selector-wrap" style="display: none">
          <div class="day-selector">
            <label class="day-check"
              ><input type="checkbox" value="1" /><span>월</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="2" /><span>화</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="3" /><span>수</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="4" /><span>목</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="5" /><span>금</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="6" /><span>토</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="0" /><span>일</span></label
            >
          </div>
        </div>
        <div style="display: flex; gap: 10px">
          <button
            class="btn-save"
            id="notiSaveBtn"
            style="flex: 1"
            onclick="addNotification()"
            data-i18n="btnAddNoti"
          >
            알림 추가
          </button>
          <button
            class="btn-save"
            id="notiDelBtn"
            style="display: none; background: #ef4444; color: #fff; flex: 0.4"
            onclick="showDeleteConfirm()"
            data-i18n="btnDelete"
          >
            삭제
          </button>
        </div>
      </div>
    </div>
    <div
      class="modal"
      id="memoModal"
      onclick="event.target == this && closeModal('memoModal')"
    >
      <div class="modal-content">
        <h3 id="memoModalTitle" data-i18n="modalMemoAdd">메모 추가</h3>
        <input
          type="text"
          id="memoTitle"
          data-i18n-ph="memoTitle"
          placeholder="메모 제목"
        /><textarea
          id="memoContent"
          data-i18n-ph="memoContent"
          placeholder="메모 내용"
          rows="4"
        ></textarea>
        <div style="display: flex; gap: 10px">
          <button
            class="btn-save"
            id="memoSaveBtn"
            style="flex: 1"
            onclick="addMemo()"
            data-i18n="btnSaveMemo"
          >
            메모 저장
          </button>
          <button
            class="btn-save"
            id="memoDelBtn"
            style="display: none; background: #ef4444; color: #fff; flex: 0.4"
            onclick="showDeleteConfirm()"
            data-i18n="btnDelete"
          >
            삭제
          </button>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/ui.js?v=1.0.2"></script>
    <script src="assets/js/modules/clock.js"></script>
    <script src="assets/js/modules/calendar.js"></script>
    <script src="assets/js/modules/search.js"></script>
    <script src="assets/js/modules/weather.js?v=1.0.1"></script>
    <script src="assets/js/modules/shortcuts.js"></script>
    <script src="assets/js/modules/memo.js"></script>
    <script src="assets/js/modules/noti.js?v=1.0.1"></script>
    <script src="assets/js/modules/quote.js"></script>
    <script src="assets/js/modules/settings.js?v=1.0.3"></script>
    <script src="assets/js/modules/ai.js?v=1.0.7"></script>
    <script src="assets/js/modules/files.js"></script>
    <script src="assets/js/modules/tutorial.js"></script>
    <script src="assets/js/app.js?v=1.0.1"></script>
  </body>
</html>
