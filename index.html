<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OnTo.kr</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=JetBrains+Mono:wght@500&display=swap");
      :root {
        --glass-bg: rgba(0, 0, 0, 0.45);
        --glass-border: rgba(255, 255, 255, 0.15);
        --accent-color: #38bdf8;
        --warning-color: #fbbf24;
        --memo-color: #fcd34d;
        --quote-shadow:
          0 4px 15px rgba(0, 0, 0, 1), 0 2px 4px rgba(0, 0, 0, 0.8);
        --btn-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
      }
      body {
        margin: 0;
        padding: 100px 20px 180px;
        min-height: 100vh;
        background-color: #020617;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        color: #f1f5f9;
        font-family: Pretendard, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
        transition: background-image 0.8s ease-in-out;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 0 0;
        z-index: -1;
      }
      .widget-btn {
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        color: #fff;
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0.7;
        transition: 0.3s;
        box-shadow: var(--btn-shadow);
      }
      .widget-btn:hover {
        opacity: 1;
        border-color: var(--accent-color);
        color: var(--accent-color);
      }
      .fab-container {
        position: relative;
        display: flex;
        align-items: center;
      }
      .fab-menu {
        display: flex;
        gap: 10px;
        position: absolute;
        opacity: 0;
        visibility: hidden;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
        z-index: 200;
        transform: scale(0.9) translateX(-10px);
      }
      .fab-menu.active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transform: scale(1) translateX(0);
      }
      .right-menu {
        left: 55px;
        top: 0;
        flex-direction: row;
      }
      #top-left-widgets {
        position: fixed;
        top: 30px;
        left: 30px;
        z-index: 100;
      }
      #top-right-widgets {
        position: fixed;
        top: 30px;
        right: 30px;
        z-index: 100;
        display: flex;
        flex-direction: row;
        gap: 20px;
        align-items: flex-start;
        transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .weather-item {
        position: relative;
        text-align: center;
        min-width: 120px;
        cursor: pointer;
        transition: 0.3s;
        background: transparent;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid transparent;
      }
      .weather-item:hover {
        background: rgba(0, 0, 0, 0.4);
        border-color: var(--accent-color);
      }
      .weather-loc {
        font-size: 0.8rem;
        opacity: 0.9;
        margin-bottom: 4px;
        text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.8);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 150px;
      }
      .weather-main {
        font-family: "JetBrains Mono", monospace;
        font-size: 1.5rem;
        color: var(--accent-color);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-weight: 700;
        line-height: 1;
        text-shadow: 1px 2px 5px rgba(0, 0, 0, 0.9);
      }
      .weather-hl {
        font-size: 0.8rem;
        opacity: 0.9;
        margin-top: 6px;
        text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.8);
      }
      .forecast-window {
        display: none;
        position: absolute;
        top: 100%;
        right: 0;
        background: rgba(15, 23, 42, 0.45);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 18px;
        padding: 15px;
        width: 250px;
        z-index: 2000;
        margin-top: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        animation: fadeIn 0.3s ease-out;
      }
      .forecast-window.active {
        display: block;
      }
      .forecast-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .forecast-item:last-child {
        border-bottom: none;
      }
      .forecast-day {
        font-size: 0.85rem;
        width: 40px;
      }
      .forecast-icon {
        font-size: 1rem;
        color: var(--accent-color);
        width: 30px;
        text-align: center;
      }
      .forecast-temp {
        font-family: "JetBrains Mono";
        font-size: 0.85rem;
        width: 90px;
        text-align: right;
      }
      .city-search-container {
        position: relative;
        margin-bottom: 20px;
      }
      .city-results {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 10px;
        max-height: 200px;
        overflow-y: auto;
        z-index: 100;
        display: none;
      }
      .city-result-item {
        padding: 10px;
        cursor: pointer;
        font-size: 0.85rem;
        border-bottom: 1px solid #1e293b;
      }
      .city-result-item:hover {
        background: #1e293b;
        color: var(--accent-color);
      }
      .location-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 20px;
        max-height: 150px;
        overflow-y: auto;
        padding-right: 5px;
      }
      .location-list::-webkit-scrollbar {
        width: 4px;
      }
      .location-list::-webkit-scrollbar-thumb {
        background: var(--accent-color);
        border-radius: 4px;
      }
      .location-tag {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #0f172a;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 0.85rem;
        border: 1px solid #334155;
      }
      .location-tag i {
        cursor: pointer;
        color: #ef4444;
      }
      #quote-section {
        text-align: center;
        margin-bottom: 60px;
        max-width: 1000px;
        width: 100%;
        animation: fadeIn 1.2s ease-out;
      }
      #quote-text {
        font-family: "Noto Serif KR", serif;
        font-size: 3rem;
        font-weight: 700;
        line-height: 1.5;
        color: #fff;
        text-shadow: var(--quote-shadow);
        margin-bottom: 20px;
        word-break: keep-all;
      }
      #quote-author {
        font-size: 1.1rem;
        color: var(--accent-color);
        text-align: right;
        display: block;
        letter-spacing: 4px;
        font-weight: 600;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
        padding-right: 20px;
      }
      #shortcut-container {
        display: grid;
        gap: 15px;
        width: 100%;
        max-width: calc(100vw - 460px);
        margin: 0 auto;
      }
      .grid-layout,
      .list-layout {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      }
      .shortcut-item {
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 16px 10px;
        font-size: 0.9rem;
        text-align: center;
        text-decoration: none;
        color: #fff;
        transition: all 0.3s;
        position: relative;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .shortcut-item:active {
        transform: scale(0.95);
      }
      .shortcut-item:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateY(-8px);
        border-color: var(--accent-color);
      }
      .shortcut-item img {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        margin-bottom: 8px;
        pointer-events: none;
      }
      .shortcut-item span {
        width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        display: block;
      }
      .context-menu {
        display: none;
        position: absolute;
        z-index: 2000;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 8px 0;
        min-width: 120px;
        box-shadow: var(--btn-shadow);
        overflow: hidden;
      }
      .context-menu div {
        padding: 12px 20px;
        font-size: 0.95rem;
        cursor: pointer;
        color: #fff;
        transition: 0.2s;
        text-align: center;
        font-weight: 700;
      }
      .context-menu div:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .context-menu .cm-del {
        color: #ef4444;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
      .bottom-widgets {
        position: fixed;
        bottom: 30px;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0 30px;
        box-sizing: border-box;
        pointer-events: none;
        z-index: 100;
      }
      .left-area {
        align-items: flex-start;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: auto;
        position: relative;
        z-index: 20;
      }
      .right-area {
        align-items: flex-end;
        display: flex;
        flex-direction: column-reverse;
        pointer-events: auto;
        position: relative;
        z-index: 10;
      }
      #clock-container {
        margin-bottom: 0;
      }
      #calendar-container,
      #noti-folder {
        margin-bottom: 15px;
      }
      .widget-sidebar {
        position: fixed;
        right: -60px;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-right: none;
        border-radius: 20px 0 0 20px;
        padding: 15px 10px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 1000;
        transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .sidebar-trigger {
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 40px;
        height: 80px;
        z-index: 999;
        cursor: pointer;
      }
      .sidebar-hint {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        color: #fff;
        opacity: 0.3;
        font-size: 1.4rem;
        font-weight: 700;
        font-family: "JetBrains Mono", monospace;
        pointer-events: none;
        animation: hintArrow 2.5s infinite;
        transition: 0.3s;
        text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
      }
      .sidebar-trigger:hover .sidebar-hint {
        opacity: 0 !important;
      }
      /* Hide hint when sidebar is open/hovered */
      body:has(.widget-sidebar:hover) .sidebar-hint {
        opacity: 0 !important;
      }
      @keyframes hintArrow {
        0%, 100% { transform: translateY(-50%) translateX(0); opacity: 0.3; }
        50% { transform: translateY(-50%) translateX(-12px); opacity: 0.8; }
      }
      .sidebar-trigger:hover + .widget-sidebar,
      .widget-sidebar:hover {
        right: 0;
      }
      .sidebar-icon {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #fff;
        opacity: 0.6;
        transition: 0.3s;
        font-size: 1.2rem;
      }
      .sidebar-icon:hover {
        opacity: 1;
        color: var(--accent-color);
        transform: scale(1.1);
      }
      .sidebar-icon.active {
        opacity: 1;
        color: var(--accent-color);
      }
      #calendar-container,
      #clock-container,
      #noti-folder,
      #top-right-widgets,
      #memo-folder {
        transition:
          transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          margin 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          padding 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: right bottom;
        max-height: 1000px;
      }
      .widget-hidden {
        opacity: 0 !important;
        transform: scale(0.9) translateX(20px) !important;
        pointer-events: none !important;
        max-height: 0 !important;
        margin-top: 0 !important;
        margin-bottom: 0 !important;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
        overflow: hidden !important;
        border: none !important;
      }
      #top-right-widgets.widget-hidden {
        transform: scale(0.9) translateY(-20px) !important;
      }
      #memo-folder.widget-hidden {
        transform: scale(0.9) translateX(-20px) !important;
      }
      .smart-folder {
        display: none;
        position: relative;
      }
      .smart-folder.has-items {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .folder-icon {
        display: none !important;
        position: relative;
      }
      .folder-content {
        width: 170px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .item-card {
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        padding: 12px 15px;
        width: 100%;
        box-sizing: border-box;
        position: relative;
        animation: slideIn 0.3s ease;
        box-shadow: var(--btn-shadow);
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        flex-direction: column;
      }
      .item-card:hover {
        border-color: var(--accent-color);
      }
      .item-card .title {
        font-size: 0.85rem;
        font-weight: 600;
        color: #fff;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding-right: 15px;
      }
      .noti-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 4px;
        font-size: 0.75rem;
        font-family: "JetBrains Mono";
      }
      #clock-container {
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        padding: 12px 22px;
        border-radius: 18px;
        text-align: right;
        box-shadow: var(--btn-shadow);
        display: flex;
        flex-direction: column;
        width: fit-content;
        align-self: flex-end;
      }
      #clock-time {
        font-family: "JetBrains Mono", monospace;
        font-size: 1.6rem;
        color: var(--accent-color);
        line-height: 1;
      }
      .calendar-widget {
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        padding: 15px;
        border-radius: 18px;
        box-shadow: var(--btn-shadow);
        width: 200px;
        color: #fff;
        font-size: 0.8rem;
      }
      .calendar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        font-weight: 700;
        color: var(--accent-color);
        font-family: "JetBrains Mono";
      }
      .calendar-days-header {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 2px;
        text-align: center;
        font-weight: 700;
        margin-bottom: 5px;
        opacity: 0.7;
      }
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 2px;
        text-align: center;
      }
      .calendar-day {
        padding: 4px 0;
        border-radius: 4px;
      }
      .calendar-day.today {
        background: var(--accent-color);
        color: var(--accent-contrast, #0f172a);
        font-weight: 700;
      }
      .calendar-day.other-month {
        opacity: 0.3;
      }
      .sun {
        color: #ff5f5f !important;
      }
      .sat {
        color: #60a5fa !important;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
      }
      .modal-content {
        background: #1e293b;
        padding: 35px;
        border-radius: 30px;
        width: 340px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid var(--glass-border);
        box-sizing: border-box;
      }
      #memoModal .modal-content {
        width: 600px;
        max-width: 90vw;
      }
      #memoContent {
        height: 300px;
        resize: vertical;
        font-size: 1rem;
        line-height: 1.6;
      }
      .modal-content h3 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 25px;
        font-size: 1.2rem;
      }
      .modal-content input,
      .modal-content textarea,
      .time-select {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #0f172a;
        color: #fff;
        box-sizing: border-box;
        font-family: inherit;
      }
      .toggle-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
      }
      .toggle-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.9rem;
        color: #f1f5f9;
      }
      .toggle-item input {
        width: auto;
        margin-bottom: 0;
        cursor: pointer;
      }
      .time-picker-row {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }
      .time-select {
        margin-bottom: 0;
        cursor: pointer;
        text-align: center;
        font-family: "JetBrains Mono";
      }
      .repeat-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 15px;
        font-size: 0.9rem;
        white-space: nowrap;
      }
      .day-selector {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .day-check input {
        display: none;
      }
      .day-check span {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        border-radius: 8px;
        font-size: 0.75rem;
        border: 1px solid #334155;
        cursor: pointer;
      }
      .day-check input:checked + span {
        background: var(--accent-color);
        color: var(--accent-contrast, #0f172a);
        font-weight: 700;
      }
      .btn-save {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: var(--accent-color);
        color: var(--accent-contrast, #0f172a);
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-save:hover {
        opacity: 0.9;
      }
      .theme-colors {
        display: grid;
        grid-template-columns: repeat(5, 35px);
        gap: 10px;
        justify-content: center;
        margin-bottom: 10px;
      }
      .color-swatch {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.2s;
        box-shadow: var(--btn-shadow);
      }
      .color-swatch:hover {
        transform: scale(1.15);
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (max-width: 768px) {
        body {
          padding: 160px 15px 120px;
        }
        #top-left-widgets {
          top: 15px;
          left: 15px;
        }
        #top-right-widgets {
          top: 15px;
          right: 15px;
        }
        .bottom-widgets {
          bottom: 15px;
          padding: 0 15px;
        }
        #quote-text {
          font-size: 2rem;
        }
        #shortcut-container {
          max-width: 100%;
        }
        .grid-layout,
        .list-layout {
          grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
          gap: 12px;
        }
        .widget-btn {
          width: 40px;
          height: 40px;
          font-size: 0.9rem;
        }
        #clock-container,
        #weather-container {
          padding: 10px 15px;
          border-radius: 14px;
        }
        #clock-time {
          font-size: 1.3rem;
        }
        .weather-main {
          font-size: 1.2rem;
        }

          ? shortcuts[index].url
          : "";
        document.getElementById("linkModalTitle").innerText = isEdit
          ? T.modalLinkEdit
          : T.modalLinkAdd;
        document.getElementById("linkSaveBtn").innerText = isEdit
          ? T.btnEdit
          : T.btnSave;
        openModal("linkModal");
        setTimeout(() => document.getElementById("siteName").focus(), 50);
      };
      const editCurrentShortcut = () => {
        document.getElementById("shortcutContextMenu").style.display = "none";
        openLinkModal(currentShortcutIndex);
      };
      const deleteCurrentShortcut = () => {
        document.getElementById("shortcutContextMenu").style.display = "none";
        if (confirm(LANG[userLang].alertDel)) {
          shortcuts.splice(currentShortcutIndex, 1);
          renderShortcuts();
          saveData();
        }
      };
      const openMemoModal = (id = null) => {
        currentEditMemoId = id;
        const T = LANG[userLang],
          d = document.getElementById("memoDelBtn"),
          m = id ? memos.find((x) => x.id == id) : null;
        document.getElementById("memoTitle").value = m ? m.title : "";
        document.getElementById("memoContent").value = m ? m.content : "";
        document.getElementById("memoModalTitle").innerText = id
          ? T.modalMemoEdit
          : T.modalMemoAdd;
        d.style.display = id ? "block" : "none";
        openModal("memoModal");
        setTimeout(() => document.getElementById("memoTitle").focus(), 50);
      };
      const openNotiModal = (id = null) => {
        currentEditNotiId = id;
        const T = LANG[userLang],
          dBtn = document.getElementById("notiDelBtn"),
          sBtn = document.getElementById("notiSaveBtn");
        const now = new Date(),
          today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
        const n = id ? notifications.find((x) => x.id == id) : null;
        document.getElementById("notiTitle").value = n ? n.title : "";
        document.getElementById("notiDesc").value = n ? n.desc || "" : "";
        const [h, m] = n
          ? n.time.split(":")
          : [
              String(now.getHours()).padStart(2, "0"),
              String(now.getMinutes()).padStart(2, "0"),
            ];
        document.getElementById("notiHour").value = h;
        document.getElementById("notiMin").value = m;
        document.getElementById("notiDate").value = n ? n.date || today : today;
        document.getElementById("isRepeat").checked = n ? n.isRepeat : !1;
        toggleDaySelector(n ? n.isRepeat : !1);
        document
          .querySelectorAll(".day-check input")
          .forEach(
            (chk) => (chk.checked = n ? n.days.includes(chk.value) : !1),
          );
        document.getElementById("notiModalTitle").innerText = id
          ? T.modalNotiEdit
          : T.modalNotiAdd;
        sBtn.innerText = id ? T.btnEditNoti : T.btnAddNoti;
        sBtn.dataset.i18n = id ? "btnEditNoti" : "btnAddNoti";
        dBtn.style.display = id ? "block" : "none";
        openModal("notiModal");
        setTimeout(() => document.getElementById("notiTitle").focus(), 50);
      };
      const addShortcut = () => {
        const n = document.getElementById("siteName").value,
          u = document.getElementById("siteUrl").value;
        if (n && u) {
          currentShortcutIndex !== null
            ? (shortcuts[currentShortcutIndex] = { name: n, url: u })
            : shortcuts.push({ name: n, url: u });
          renderShortcuts();
          saveData();
          closeModal("linkModal");
        }
      };
      const addNotification = () => {
        const t = document.getElementById("notiTitle").value,
          h = document.getElementById("notiHour").value,
          m = document.getElementById("notiMin").value,
          r = document.getElementById("isRepeat").checked,
          dt = document.getElementById("notiDate").value,
          days = Array.from(
            document.querySelectorAll(".day-check input:checked"),
          ).map((x) => x.value);
        if (t) {
          const data = {
            id: currentEditNotiId || Date.now(),
            title: t,
            desc: document.getElementById("notiDesc").value,
            time: `${h}:${m}`,
            isRepeat: r,
            days,
            date: dt,
          };
          currentEditNotiId
            ? (notifications[
                notifications.findIndex((x) => x.id == currentEditNotiId)
              ] = data)
            : notifications.push(data);
          renderNotifications();
          closeModal("notiModal");
        }
      };
      const deleteCurrentNoti = () => {
        if (confirm(LANG[userLang].alertDel)) {
          notifications = notifications.filter(
            (x) => x.id != currentEditNotiId,
          );
          renderNotifications();
          closeModal("notiModal");
        }
      };
      const addMemo = () => {
        const t = document.getElementById("memoTitle").value,
          c = document.getElementById("memoContent").value;
        if (t) {
          currentEditMemoId
            ? (memos[memos.findIndex((x) => x.id == currentEditMemoId)] = {
                ...memos.find((x) => x.id == currentEditMemoId),
                title: t,
                content: c,
              })
            : memos.push({ id: Date.now(), title: t, content: c });
          renderMemos();
          closeModal("memoModal");
        }
      };
      const deleteCurrentMemo = () => {
        if (confirm(LANG[userLang].alertDel)) {
          memos = memos.filter((x) => x.id != currentEditMemoId);
          renderMemos();
          closeModal("memoModal");
        }
      };
      const exportData = () => {
        const d = {
          shortcuts,
          notifications,
          memos,
          theme: localStorage.getItem("dj_theme_color"),
          seed: localStorage.getItem("dj_bg_seed"),
          bgKeyword: localStorage.getItem("dj_bg_keyword"),
        };
        const blob = new Blob([JSON.stringify(d)], {
            type: "application/json",
          }),
          a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "dj_smarthub.json";
        a.click();
      };
      const importData = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
          const d = JSON.parse(ev.target.result);
          shortcuts = d.shortcuts || [];
          notifications = d.notifications || [];
          memos = d.memos || [];
          saveData();
          if (d.theme) setTheme(d.theme);
          if (d.bgKeyword) localStorage.setItem("dj_bg_keyword", d.bgKeyword);
          if (d.seed) {
            localStorage.setItem("dj_bg_seed", d.seed);
            setBackground(d.seed);
          }
          renderShortcuts();
          renderNotifications();
          renderMemos();
          alert(LANG[userLang].alertRestore);
        };
        r.readAsText(f);
      };
      const toggleDaySelector = (s) => {
        document.getElementById("day-selector-wrap").style.display = s
          ? "block"
          : "none";
        document.getElementById("notiDate").disabled = s;
      };
      const openModal = (id) =>
        (document.getElementById(id).style.display = "block");
      const closeModal = (id) =>
        (document.getElementById(id).style.display = "none");
      const showTutorial = () => {
        const driver = window.driver.js.driver,
          T = LANG[userLang];
        driver({
          showProgress: !0,
          nextBtnText: T.tutNext,
          prevBtnText: T.tutPrev,
          doneBtnText: T.tutDone,
          allowClose: !1,
          steps: [
            {
              element: ".sidebar-trigger",
              popover: {
                title: T.tutSidebarTitle,
                description: T.tutSidebarDesc,
                side: "left",
                align: "center",
              },
            },
            {
              element: "#top-right-widgets",
              popover: {
                title: T.tutWeatherTitle,
                description: T.tutWeatherDesc,
                side: "left",
                align: "start",
              },
            },
            {
              element: ".right-area",
              popover: {
                title: T.tutBottomWidgetsTitle,
                description: T.tutBottomWidgetsDesc,
                side: "top",
                align: "end",
              },
            },
            {
              element: ".bottom-widgets .left-area .fab-container",
              popover: {
                title: T.tutSettingTitle,
                description: T.tutSettingDesc,
                side: "top",
                align: "start",
              },
            },
            {
              element: "#top-left-widgets .fab-container",
              popover: {
                title: T.tutFileTitle,
                description: T.tutFileDesc,
                side: "right",
                align: "start",
              },
            },
          ],
        }).drive();
      };
      applyLanguage();
      const sd =
        localStorage.getItem("dj_bg_seed") || Math.floor(Math.random() * 10000);
      setBackground(sd);
      fetchQuote();
      initTimePicker();
      fetchWeather();
      setInterval(updateAll, 1e3);
      updateAll();
      renderShortcuts();
      renderNotifications();
      renderMemos();
      applyVisibility();
      window.addEventListener(
        "load",
        () =>
          !localStorage.getItem("dj_tutorial_done") &&
          setTimeout(() => {
            showTutorial();
            localStorage.setItem("dj_tutorial_done", "true");
          }, 800),
      );
    </script>
  </body>
</html>
