<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OnTo.kr</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="assets/css/style.css?v=1.1.0" />
  </head>
  <body onclick="requestNotiPermission()">
    <div id="globalContextMenu" class="context-menu">
      <div id="ctx-add" onclick="addCurrentItem()" data-i18n="cmAdd">추가</div>
      <div id="ctx-edit" onclick="editCurrentItem()" data-i18n="cmEdit">수정</div>
      <div
        id="ctx-del"
        class="cm-del"
        onclick="showDeleteConfirm()"
        data-i18n="cmDelete"
      >
        삭제
      </div>
      <div id="ctx-hide" class="cm-hide" onclick="hideCurrentWidget()" data-i18n="cmHide">
        숨기기
      </div>
    </div>

    <!-- 커스텀 삭제 확인 모달 -->
    <div id="deleteConfirmModal" class="modal" onclick="event.target == this && closeModal('deleteConfirmModal')">
      <div class="modal-content delete-modal">
        <div class="delete-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <h3 data-i18n="alertDel" style="margin-bottom: 30px;">삭제하시겠습니까?</h3>
        <div style="display: flex; gap: 12px;">
          <button class="btn-save" style="background: #334155; color: #fff; flex: 1;" onclick="closeModal('deleteConfirmModal')" data-i18n="btnCancel">취소</button>
          <button class="btn-save" style="background: #ef4444; color: #fff; flex: 1;" onclick="deleteCurrentItem()" data-i18n="btnConfirmDelete">삭제</button>
        </div>
      </div>
    </div>

    <!-- 범용 안내 모달 -->
    <div id="alertModal" class="modal" onclick="event.target == this && closeModal('alertModal')">
      <div class="modal-content delete-modal">
        <div class="delete-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <h3 id="alertModalMsg" data-i18n="alertLocExists" style="margin-bottom: 30px;">이미 추가된 지역입니다.</h3>
        <div style="display: flex; justify-content: center;">
          <button class="btn-save" style="background: var(--accent-color); color: var(--accent-contrast); min-width: 120px;" onclick="closeModal('alertModal')" data-i18n="btnOk">확인</button>
        </div>
      </div>
    </div>

    <div id="top-left-widgets">
      <div class="fab-container">
        <div
          class="widget-btn fab-main"
          data-i18n-title="tipFile"
          onclick="toggleFab('tl-fab', event)"
        >
          <i class="fas fa-folder"></i>
        </div>
        <div class="fab-menu right-menu" id="tl-fab">
          <input
            type="file"
            id="importFile"
            style="display: none"
            accept=".json"
            onchange="importData(event)"
          />
          <div
            class="widget-btn"
            data-i18n-title="tipBackup"
            onclick="exportData()"
          >
            <i class="fas fa-download"></i>
          </div>
          <div
            class="widget-btn"
            data-i18n-title="tipRestore"
            onclick="document.getElementById('importFile').click()"
          >
            <i class="fas fa-upload"></i>
          </div>
        </div>
      </div>
    </div>
    <div class="sidebar-trigger"><div class="sidebar-hint">&laquo;</div></div>
    <div class="widget-sidebar">
      <div
        class="sidebar-icon"
        id="side-weather"
        onclick="toggleWidget('weather')"
        data-i18n-title="sideWeather"
      >
        <i class="fas fa-cloud-sun"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-quote"
        onclick="toggleWidget('quote')"
        data-i18n-title="sideQuote"
      >
        <i class="fas fa-quote-right"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-search"
        onclick="toggleWidget('search')"
        data-i18n-title="lblSearch"
      >
        <i class="fas fa-search"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-shortcut"
        onclick="toggleWidget('shortcut')"
        data-i18n-title="tipLink"
      >
        <i class="fas fa-link"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-memo"
        onclick="toggleWidget('memo')"
        data-i18n-title="sideMemo"
      >
        <i class="fas fa-sticky-note"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-noti"
        onclick="toggleWidget('noti')"
        data-i18n-title="sideNoti"
      >
        <i class="fas fa-bell"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-calendar"
        onclick="toggleWidget('calendar')"
        data-i18n-title="sideCalendar"
      >
        <i class="fas fa-calendar-alt"></i>
      </div>
      <div
        class="sidebar-icon"
        id="side-clock"
        onclick="toggleWidget('clock')"
        data-i18n-title="sideClock"
      >
        <i class="fas fa-clock"></i>
      </div>
    </div>
    <div id="top-right-widgets" oncontextmenu="showContextMenu(event, 'weather')"></div>
    <div id="quote-section">
      <div class="quote-container">
        <span id="quote-text">...</span>
        <span id="quote-author-wrap">
          <span id="quote-author"></span>
          <i class="fas fa-sync-alt refresh-quote" onclick="fetchQuote()"></i>
        </span>
      </div>
    </div>
    <div id="search-section">
      <div class="search-box">
        <i class="fas fa-robot ai-search-icon" onclick="ui.toggleWidget('ai')" style="cursor: pointer; opacity: 0.7; transition: 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7" data-i18n-title="sideAI"></i>
        <i class="fas fa-search" style="margin-left: 10px;"></i>
        <input
          type="text"
          id="searchInput"
          data-i18n-ph="searchPh"
          placeholder="검색어를 입력하세요"
          onkeypress="event.key === 'Enter' && performSearch()"
        />
        <div class="search-engine-icon" onclick="toggleSearchEngineMenu(event)">
          <div id="search-engine-current"></div>
          <i class="fas fa-caret-right" style="font-size: 0.7rem; color: #94a3b8; margin-left: 5px; opacity: 0.7;"></i>
          <div id="search-engine-menu" class="search-engine-menu"></div>
        </div>
      </div>
    </div>
    <div id="shortcut-container"></div>
    <div id="ai-chatbot-container" class="widget-hidden">
      <div class="ai-history-panel" id="ai-history">
        <div class="ai-history-header">
          <span class="history-title" data-i18n="lblAIHistory">채팅 목록</span>
          <div style="display: flex; gap: 10px;">
            <i class="fas fa-plus" onclick="ai.loadChat()" data-i18n-title="cmAdd"></i>
            <i class="fas fa-bars" onclick="ai.toggleHistory()"></i>
          </div>
        </div>
        <div class="ai-history-list" id="ai-history-list"></div>
      </div>
      <div class="ai-main-panel">
        <div class="ai-chat-header">
          <div class="ai-status" id="ai-status">
            <i class="fas fa-circle"></i>
            <span id="ai-model-name">...</span>
          </div>
          <div class="ai-actions">
            <i class="fas fa-times" onclick="ui.toggleWidget('ai')" data-i18n-title="cmHide"></i>
          </div>
        </div>
        <div class="ai-chat-messages" id="ai-messages"></div>
        <div class="ai-chat-input-area">
          <textarea id="ai-user-input" data-i18n-ph="aiInputPh" placeholder="메시지를 입력하세요... (Ctrl+Enter로 전송)" onkeydown="ai.handleKeyDown(event)"></textarea>
          <div class="ai-input-actions">
            <button class="ai-icon-btn" onclick="ai.attachFile()"><i class="fas fa-paperclip"></i></button>
            <button id="ai-send-btn" onclick="ai.sendMessage()">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom-widgets">
      <div class="left-area">
        <div class="smart-folder" id="memo-folder" oncontextmenu="showContextMenu(event, 'memo')">
          <div
            class="widget-btn folder-icon"
            onclick="toggleFolder('memo-folder', event)"
          >
            <i class="fas fa-sticky-note" style="color: var(--memo-color)"></i>
          </div>
          <div class="folder-content" id="memo-list"></div>
        </div>
        <div class="fab-container">
          <div
            class="widget-btn fab-main"
            data-i18n-title="tipMenu"
            onclick="toggleFab('bl-fab', event)"
          >
            <i class="fas fa-cog"></i>
          </div>
          <div class="fab-menu right-menu" id="bl-fab">
            <div
              class="widget-btn"
              data-i18n-title="tipSetting"
              onclick="openSettingModal()"
            >
              <i class="fas fa-sliders-h"></i>
            </div>
            <div
              class="widget-btn"
              data-i18n-title="tipNoti"
              onclick="openNotiModal()"
            >
              <i class="fas fa-bell"></i>
            </div>
            <div
              class="widget-btn"
              data-i18n-title="tipMemo"
              onclick="openMemoModal()"
            >
              <i class="fas fa-pen"></i>
            </div>
            <div
              class="widget-btn"
              data-i18n-title="tipLink"
              onclick="openLinkModal()"
            >
              <i class="fas fa-link"></i>
            </div>
          </div>
        </div>
      </div>
      <div class="right-area">
        <div id="clock-container" oncontextmenu="showContextMenu(event, 'clock')" onclick="toggleTimeFormat()">
          <div id="clock-time">00:00:00</div>
        </div>
        <div id="calendar-container" class="calendar-widget" oncontextmenu="showContextMenu(event, 'calendar')">
          <div class="calendar-header">
            <i class="fas fa-caret-left cal-nav" onclick="changeMonth(-1)"></i>
            <span id="cal-month-year">...</span>
            <i class="fas fa-caret-right cal-nav" onclick="changeMonth(1)"></i>
          </div>
          <div class="calendar-days-header" id="cal-days-header"></div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
        <div class="smart-folder" id="noti-folder" oncontextmenu="showContextMenu(event, 'noti')">
          <div
            class="widget-btn folder-icon"
            onclick="toggleFolder('noti-folder', event)"
          >
            <i class="fas fa-bell" style="color: var(--warning-color)"></i>
          </div>
          <div class="folder-content" id="noti-list"></div>
        </div>
      </div>
    </div>
    <div
      class="modal"
      id="settingModal"
      onclick="event.target == this && closeModal('settingModal')"
    >
      <div class="modal-content">
        <h3 data-i18n="modalSetting">환경 설정</h3>
        <div style="flex: 1; display: flex; flex-direction: column;">
          <div class="setting-grid">
            <div class="setting-column">
              <div class="setting-group-title" data-i18n="lblTheme">
                테마 색상
              </div>
              <div class="theme-colors" style="margin-bottom: 20px">
                <div class="color-swatch" style="background: #ef4444" onclick="setTheme('#ef4444')"></div>
                <div class="color-swatch" style="background: #f97316" onclick="setTheme('#f97316')"></div>
                <div class="color-swatch" style="background: #eab308" onclick="setTheme('#eab308')"></div>
                <div class="color-swatch" style="background: #22c55e" onclick="setTheme('#22c55e')"></div>
                <div class="color-swatch" style="background: #3b82f6" onclick="setTheme('#3b82f6')"></div>
                <div class="color-swatch" style="background: #6366f1" onclick="setTheme('#6366f1')"></div>
                <div class="color-swatch" style="background: #a855f7" onclick="setTheme('#a855f7')"></div>
                <div class="color-swatch" style="background: #ec4899" onclick="setTheme('#ec4899')"></div>
                <div class="color-swatch" style="background: #fff" onclick="setTheme('#fff')"></div>
                <div class="color-swatch" style="background: #000; border: 1px solid rgba(255, 255, 255, 0.3);" onclick="setTheme('#000')"></div>
              </div>

              <div class="setting-group-title" data-i18n="lblBgKeyword">
                배경화면 키워드
              </div>
              <input type="text" id="bgKeywordInput" data-i18n-ph="bgKeywordPh" placeholder="예: nature, space, city, dark" onkeypress="event.key === 'Enter' && saveSettings()" style="width: 98%; margin-left: 1%;"/>

              <div class="setting-group-title" style="display: flex; justify-content: space-between; align-items: center;">
                <span data-i18n="lblSearchEngine">검색 엔진</span>
                <label class="compact-checkbox-label" style="display: flex; align-items: center; gap: 6px; font-weight: normal; cursor: pointer;">
                  <input type="checkbox" id="searchNewTab" style="width: 14px; height: 14px; margin: 0; cursor: pointer;">
                  <span class="setting-label-text" data-i18n="lblSearchNewTab">새 창으로 검색</span>
                </label>
              </div>
              <select id="searchEngineSelect" onchange="toggleCustomSearchUrl()" style="margin-bottom: 10px; width: 98%; margin-left: 1%;">
                <option value="google">Google</option>
                <option value="naver">Naver</option>
                <option value="chatgpt">ChatGPT</option>
                <option value="custom" data-i18n="optCustom">Custom URL</option>
              </select>
              <input type="text" id="customSearchUrlInput" placeholder="https://example.com/search?q=" style="display: none; margin-bottom: 10px; width: 98%; margin-left: 1%;"/>
            </div>

            <div class="setting-column">
              <div class="setting-group-title" data-i18n="lblLayout">크기</div>
              <div class="setting-row" style="gap: 15px; align-items: center; margin-bottom: 20px;">
                <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
                  <span style="font-size: 0.85rem; color: #94a3b8; white-space: nowrap; margin: 0; display: flex; align-items: center;" data-i18n="lblQuoteSize">명언 크기</span>
                  <select id="quoteFontSizeSelect" style="flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; height: 32px; text-align: center; text-align-last: center; cursor: pointer; padding: 0; margin: 0; outline: none; box-sizing: border-box;">
                    <option value="large" data-i18n="optLarge">대</option>
                    <option value="medium" data-i18n="optMedium">중</option>
                    <option value="small" data-i18n="optSmall">소</option>
                  </select>
                </div>
                <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
                  <span style="font-size: 0.85rem; color: #94a3b8; white-space: nowrap; margin: 0; display: flex; align-items: center;" data-i18n="lblWidgetSize">위젯 크기</span>
                  <select id="widgetSizeSelect" style="flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; height: 32px; text-align: center; text-align-last: center; cursor: pointer; padding: 0; margin: 0; outline: none; box-sizing: border-box;">
                    <option value="large" data-i18n="optLarge">대</option>
                    <option value="medium" data-i18n="optMedium">중</option>
                    <option value="small" data-i18n="optSmall">소</option>
                  </select>
                </div>
              </div>

              <div class="setting-group-title" style="display: flex; justify-content: space-between">
                <span data-i18n="lblWeather">날씨</span>
                <label class="compact-checkbox-label">
                  <input type="checkbox" id="showCurrentWeather" />
                  <span class="setting-label-text" data-i18n="lblCurrentWeather">현지 날씨</span>
                </label>
              </div>
              <div id="weatherLocationList" class="location-list"></div>
              <div class="city-search-container">
                <input type="text" id="citySearchInput" data-i18n-ph="citySearchPh" placeholder="도시 검색 (예: 서울, London)" autocomplete="off" oninput="searchCities(this.value)" style="width: 98%; margin-left: 1%;"/>
                <div id="citySearchResults" class="city-results"></div>
              </div>
            </div>
            
            <!-- AI 설정 (가로 전체 사용) -->
            <div class="setting-column" style="grid-column: 1 / span 2;">
              <div class="setting-group-title" style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 10px;">
                  <span data-i18n="lblAISetting">AI 설정</span>
                  <span id="ai-connection-status" style="font-size: 0.75rem; display: none;" data-i18n-title="lblServerCheck"></span>
                </div>
                <label class="compact-checkbox-label" style="display: flex; align-items: center; gap: 6px; font-weight: normal; cursor: pointer; color: #94a3b8;">
                  <input type="checkbox" id="aiDisableCheck" onchange="toggleAiSettings(this.checked)" style="width: 14px; height: 14px; margin: 0; cursor: pointer;">
                  <span class="setting-label-text" data-i18n="lblAIDisable">사용 안 함</span>
                </label>
              </div>
              <div id="aiSettingsPanel" style="display: flex; gap: 15px; align-items: center; width: 98%; margin-left: 1%; margin-bottom: 5px;">
                <div style="display: flex; align-items: center; gap: 8px; flex: 1;">
                  <span style="font-size: 0.85rem; color: #94a3b8; white-space: nowrap;">AI</span>
                  <select id="aiProviderSelect" onchange="onAIProviderChange()" style="margin-bottom: 2px; flex: 1;">
                    <option value="local">Local AI</option>
                    <option value="openai">OpenAI API</option>
                    <option value="gemini">Gemini API</option>
                    <option value="claude">Claude API</option>
                  </select>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; flex: 1;">
                  <span style="font-size: 0.85rem; color: #94a3b8; white-space: nowrap;">모델</span>
                  <select id="aiModelSelect" disabled style="margin-bottom: 2px; flex: 1;">
                    <option value="" data-i18n="aiNoServer">접속 안됨</option>
                  </select>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; flex: 1;">
                  <span id="aiKeyLabel" style="font-size: 0.85rem; color: #94a3b8; white-space: nowrap;" data-i18n="lblAIUrl">URL</span>
                  <input type="text" id="aiServerUrlInput" placeholder="서버 주소" style="margin-bottom: 2px; width: 100%; display: none;" onblur="if(window.ai) window.ai.checkConnection()"/>
                  <input type="password" id="aiApiKeyInput" placeholder="API Key" style="margin-bottom: 2px; width: 100%; display: none;" onblur="if(window.ai) window.ai.checkConnection()"/>
                  <i class="fas fa-sync-alt" onclick="if(window.ai) window.ai.checkConnection()" style="cursor: pointer; color: var(--accent-color);" data-i18n-title="tipCheckConn"></i>
                </div>
              </div>
            </div>
          </div>
          <div class="setting-footer">
            <button
              class="btn-save"
              onclick="saveSettings()"
              data-i18n="btnSaveSettings"
            >
              적용
            </button>
          </div>
        </div>
      </div>
    </div>
    <div
      class="modal"
      id="linkModal"
      onclick="event.target == this && closeModal('linkModal')"
    >
      <div class="modal-content">
        <h3 id="linkModalTitle" data-i18n="modalLinkAdd">바로가기 추가</h3>
        <input
          type="text"
          id="siteName"
          data-i18n-ph="linkName"
          placeholder="이름"
        />
        <input
          type="text"
          id="siteUrl"
          data-i18n-ph="linkUrl"
          placeholder="URL (example.com)"
          onkeypress="event.key === 'Enter' && addShortcut()"
        />
        <div class="setting-footer">
          <button
            class="btn-save"
            id="linkSaveBtn"
            onclick="addShortcut()"
            data-i18n="btnSave"
          >
            추가
          </button>
        </div>
      </div>
    </div>
    <div
      class="modal"
      id="notiModal"
      onclick="event.target == this && closeModal('notiModal')"
    >
      <div class="modal-content">
        <h3 id="notiModalTitle" data-i18n="modalNotiAdd">알림 추가</h3>
        <input
          type="text"
          id="notiTitle"
          data-i18n-ph="notiTitle"
          placeholder="알림 제목"
        /><textarea
          id="notiDesc"
          data-i18n-ph="notiDesc"
          placeholder="알림 내용 (생략 가능)"
          rows="2"
        ></textarea>
        <div class="time-picker-row">
          <select id="notiHour" class="time-select"></select
          ><select id="notiMin" class="time-select"></select>
        </div>
        <div class="repeat-row">
          <input
            type="date"
            id="notiDate"
            class="time-select"
            style="margin-bottom: 0; flex: 1; padding: 10px; font-size: 0.9rem"
          />
          <div style="display: flex; align-items: center; gap: 6px">
            <label for="isRepeat" style="cursor: pointer" data-i18n="repeatSet"
              >반복 설정</label
            >
            <input
              type="checkbox"
              id="isRepeat"
              onchange="toggleDaySelector(this.checked)"
              style="
                margin: 0;
                padding: 0;
                width: 16px;
                height: 16px;
                cursor: pointer;
                box-sizing: border-box;
              "
            />
          </div>
        </div>
        <div id="day-selector-wrap" style="display: none">
          <div class="day-selector">
            <label class="day-check"
              ><input type="checkbox" value="1" /><span>월</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="2" /><span>화</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="3" /><span>수</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="4" /><span>목</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="5" /><span>금</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="6" /><span>토</span></label
            >
            <label class="day-check"
              ><input type="checkbox" value="0" /><span>일</span></label
            >
          </div>
        </div>
        <div style="display: flex; gap: 10px">
          <button
            class="btn-save"
            id="notiSaveBtn"
            style="flex: 1"
            onclick="addNotification()"
            data-i18n="btnAddNoti"
          >
            알림 추가
          </button>
          <button
            class="btn-save"
            id="notiDelBtn"
            style="display: none; background: #ef4444; color: #fff; flex: 0.4"
            onclick="showDeleteConfirm()"
            data-i18n="btnDelete"
          >
            삭제
          </button>
        </div>
      </div>
    </div>
    <div
      class="modal"
      id="memoModal"
      onclick="event.target == this && closeModal('memoModal')"
    >
      <div class="modal-content">
        <h3 id="memoModalTitle" data-i18n="modalMemoAdd">메모 추가</h3>
        <input

          id="memoTitle"
          data-i18n-ph="memoTitle"

        /><textarea
          id="memoContent"
          data-i18n-ph="memoContent"
          placeholder="메모 내용"
          rows="4"
        ></textarea>
        <div style="display: flex; gap: 10px">
          <button
            class="btn-save"
            id="memoSaveBtn"
            style="flex: 1"
            onclick="addMemo()"
            data-i18n="btnSaveMemo"
          >
            메모 저장
          </button>
          <button
            class="btn-save"
            id="memoDelBtn"
            style="display: none; background: #ef4444; color: #fff; flex: 0.4"
            onclick="showDeleteConfirm()"
            data-i18n="btnDelete"
          >
            삭제
          </button>
        </div>
      </div>
